# ============================================================================
# 生产级 Alertmanager 配置 - 企业微信机器人通知
# ============================================================================
# 配置说明:
#   - 基于生产级告警系统配置要求设计
#   - 包含告警分级处理、抑制规则、过滤机制
#   - 符合无意义告警过滤规范
# 
# 部署方式:
#   1. 将此文件作为 Secret 部署到 Kubernetes
#      kubectl create secret generic alertmanager-prometheus-kube-prometheus-alertmanager \
#        --from-file=alertmanager.yaml=alertmanager-config.yaml -n monitoring \
#        --dry-run=client -o yaml | kubectl apply -f -
#   2. 重启 Alertmanager 使配置生效
#      kubectl rollout restart statefulset/alertmanager-prometheus-kube-prometheus-alertmanager -n monitoring
# 
# 监控验证:
#   # 检查 Alertmanager Pod 状态
#   kubectl get pod -n monitoring -l app.kubernetes.io/name=alertmanager
#   
#   # 查看 Alertmanager 配置是否加载成功
#   kubectl logs -n monitoring -l app.kubernetes.io/name=alertmanager | grep "Configuration"
# ============================================================================

global:
  # 告警恢复等待时间
  resolve_timeout: 5m
  
  # SMTP 全局配置（如果需要邮件通知）
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@company.com'
  smtp_require_tls: false

# ==================== 路由配置 ====================
# 根据告警严重程度和类型进行分发
route:
  # 默认接收器 - 用于未被其他路由捕获的告警
  receiver: 'wechat-webhook'
  
  # 按告警名称和命名空间分组，平衡通知数量和信息量
  group_by: [ 'alertname', 'namespace', 'cluster' ]
  
  # 组等待时间：等待更多告警加入当前批次
  group_wait: 30s
  
  # 组发送间隔：同一组告警的重复发送间隔
  group_interval: 5m
  
  # 重复告警间隔：相同告警再次发送的最小间隔
  repeat_interval: 3h
  
  # 子路由：按严重程度和特定条件路由到不同接收器
  routes:
    # NodeDown 告警 - 最高优先级
    - matchers:
        - alertname = "NodeDown"
      receiver: 'wechat-critical'
      group_wait: 10s
      repeat_interval: 30m
    
    # KubeNodeNotReady 告警 - 高优先级
    - matchers:
        - alertname = "KubeNodeNotReady"
      receiver: 'wechat-critical'
      group_wait: 10s
      repeat_interval: 1h
    
    # KubeNodeUnreachable 告警 - 高优先级
    - matchers:
        - alertname = "KubeNodeUnreachable"
      receiver: 'wechat-critical'
      group_wait: 10s
      repeat_interval: 1h
    
    # Critical 级别告警 - 立即通知，高优先级处理
    - matchers:
        - severity =~ "critical|Critical|CRITICAL"
      receiver: 'wechat-critical'
      group_wait: 10s          # 更快响应
      repeat_interval: 1h      # 更频繁通知
    
    # CPU/内存/磁盘等基础设施告警 - 中等优先级
    - matchers:
        - alertname =~ "HighCpuUsage|HighMemoryUsage|DiskSpaceLow|HighDiskIo"
      receiver: 'wechat-warning'
      group_wait: 1m
      repeat_interval: 2h
    
    # 应用服务告警 - 标准处理
    - matchers:
        - alertname =~ "ServiceDown|HighHttpErrorRate|HighHttpResponseTime|AppDown"
      receiver: 'wechat-warning'
      group_wait: 30s
      repeat_interval: 4h
    
    # Warning 级别告警 - 标准处理
    - matchers:
        - severity =~ "warning|Warning|WARNING"
      receiver: 'wechat-warning'
      group_wait: 30s
      repeat_interval: 4h
    
    # Info 级别告警 - 静默处理（不发送通知）
    - matchers:
        - severity =~ "info|Info|INFO"
      receiver: 'null'
    
    # 过滤无意义告警 - Watchdog 和 severity 为 none 的告警
    - matchers:
        - alertname =~ "Watchdog|None|none"
      receiver: 'null'
    
    # 过滤频繁变动的临时告警
    - matchers:
        - alertname =~ "ProbeFailed|TemporaryIssue"
      receiver: 'null'

# ==================== 抑制规则 ====================
# 当高严重级别告警存在时，抑制低级别告警，避免告警风暴
inhibit_rules:
  # Critical 告警抑制对应的 Warning 告警
  - source_matchers:
      - severity =~ "critical|Critical|CRITICAL"
    target_matchers:
      - severity =~ "warning|Warning|WARNING"
    equal: [ 'alertname', 'namespace' ]
  
  # Warning 告警抑制对应的 Info 告警
  - source_matchers:
      - severity =~ "warning|Warning|WARNING"
    target_matchers:
      - severity =~ "info|Info|INFO"
    equal: [ 'alertname', 'namespace' ]
  
  # 特定资源的多级别告警抑制（移除可能导致节点宕机告警被抑制的规则）
  - source_matchers:
      - severity = "critical"
      - alertname =~ "KubePodCrashLooping|KubeNodeNotReady|KubeDown"
    target_matchers:
      - severity =~ "warning|info"
    equal: [ 'instance', 'job', 'namespace' ]

  # 优化的抑制规则：仅抑制相同实例的同类告警
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
      - alertname =~ "HighCpuUsage|HighMemoryUsage|HighDiskUsage|HighNetworkLoss|HighResponseTime"
    equal: [ 'instance', 'namespace' ]

# ==================== 接收器配置 ====================
receivers:
  # 企业微信机器人 - 主要通知渠道
  - name: 'wechat-webhook'
    webhook_configs:
      - url: 'http://wechat-webhook-adapter.monitoring.svc.cluster.local:80/webhook'
        send_resolved: true      # 发送告警恢复通知
        # 自定义 HTTP 头部
        http_config:
          timeout: 30s
          # 如果需要认证，可以配置基本认证或 bearer token
          # basic_auth:
          #   username: "webhook"
          #   password: "password"
          # bearer_token: "token_string"
    
    # 自定义告警模板
    # 注意：这里仅定义了模板名称，实际模板需要在启动参数中指定文件
    # 例如: --template.file=/etc/alertmanager/template/*.tmpl

  # Critical 告警专用接收器 - 更紧急的通知方式
  - name: 'wechat-critical'
    webhook_configs:
      - url: 'http://wechat-webhook-adapter.monitoring.svc.cluster.local:80/webhook'
        send_resolved: true
        http_config:
          timeout: 30s
    # 可以在此处添加额外的通知方式，如短信、电话等
    # pagerduty_configs:
    #   - service_key: 'pagerduty_service_key'
    #     send_resolved: true

  # Warning 告警接收器
  - name: 'wechat-warning'
    webhook_configs:
      - url: 'http://wechat-webhook-adapter.monitoring.svc.cluster.local:80/webhook'
        send_resolved: true
        http_config:
          timeout: 30s

  # 静默接收器 - 不发送任何通知
  - name: 'null'

# ==================== 模板配置 ====================
# 模板文件路径（在 Alertmanager 启动参数中指定）
# templates:
#   - '/etc/alertmanager/templates/default.tmpl'
#   - '/etc/alertmanager/templates/wechat.tmpl'

# ==================== 额外配置 ====================
# 集群配置（当部署多个 Alertmanager 实例时使用）
# cluster:
#   # 集群成员地址
#   members:
#     - alertmanager-0.alertmanager-operated:9094
#     - alertmanager-1.alertmanager-operated:9094
#   # 集群监听地址
#   listen_address: "0.0.0.0:9094"
#   # 广播地址
#   advertise_address: "0.0.0.0:9094"

