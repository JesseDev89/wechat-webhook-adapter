# ============================================================================
# 生产级 Alertmanager 配置 - 企业微信机器人通知
# ============================================================================
# 配置说明:
#   - 基于生产级告警系统配置要求设计
#   - 包含告警分级处理、抑制规则、过滤机制、维护窗口静默
#   - Alertmanager 路由匹配规则：第一条匹配的路由生效（无 continue 时停止）
#
# 部署方式:
#   # 1. 创建/更新 Secret
#   kubectl create secret generic alertmanager-prometheus-kube-prometheus-alertmanager \
#     --from-file=alertmanager.yaml=alertmanager-config.yaml -n monitoring \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   # 2. 重启 Alertmanager 使配置生效
#   kubectl rollout restart statefulset/alertmanager-prometheus-kube-prometheus-alertmanager -n monitoring
#
# 验证配置:
#   # 检查 Alertmanager Pod 状态
#   kubectl get pod -n monitoring -l app.kubernetes.io/name=alertmanager
#
#   # 查看 Alertmanager 配置是否加载成功（无报错）
#   kubectl logs -n monitoring -l app.kubernetes.io/name=alertmanager -c alertmanager | grep -E "Loading|Configuration"
#
#   # 验证配置语法（本地测试）
#   amtool check-config alertmanager-config.yaml
# ============================================================================

# ==================== 全局配置 ====================
global:
  resolve_timeout: 5m    # 告警恢复等待时间，超时后发送 Resolved 通知

  # SMTP 全局配置（可选，如需邮件通知取消下方注释）
  # smtp_smarthost: 'smtp.company.com:587'
  # smtp_from: 'alertmanager@company.com'
  # smtp_auth_username: 'alertmanager@company.com'
  # smtp_auth_password: 'password'
  # smtp_require_tls: true

# ==================== 告警模板 ====================
# 模板文件路径，需在 Alertmanager 启动参数中配置:
#   --template.file=/etc/alertmanager/templates/*.tmpl
# templates:
#   - '/etc/alertmanager/templates/wechat.tmpl'

# ==================== 维护时间窗口 ====================
# 在维护窗口期间，特定告警将被静默（不发送通知）
# 注意：time_intervals 默认按 UTC 计算，必须显式指定 location 为 Asia/Shanghai
time_intervals:
  # 计划维护窗口：每周日 02:00 - 06:00（北京时间）
  - name: maintenance-window
    time_intervals:
      - weekdays: ['sunday']
        times:
          - start_time: '02:00'
            end_time: '06:00'
        location: 'Asia/Shanghai'

# ==================== 路由配置 ====================
# Alertmanager 路由树：自上而下匹配，第一条匹配的路由生效（除非设置 continue: true）
route:
  # 默认接收器 - 捕获未被任何子路由匹配的告警
  receiver: 'wechat-webhook'

  # 按告警名称 + 命名空间 + 集群分组，平衡通知数量和信息量
  group_by: ['alertname', 'namespace', 'cluster']

  # 组等待时间：首次收到告警后等待同组更多告警
  group_wait: 30s

  # 组发送间隔：同一组新告警的最小发送间隔
  group_interval: 5m

  # 重复告警间隔：相同告警再次发送的最小间隔（避免骚扰）
  repeat_interval: 4h

  routes:
    # ==================== 第一层：丢弃无意义告警（最高优先级） ====================

    # Watchdog 心跳告警 - Prometheus 健康检查，无需通知
    - matchers:
        - alertname = "Watchdog"
      receiver: 'null'

    # Info / None 级别告警 - 仅记录不通知
    - matchers:
        - severity =~ "info|Info|INFO|none|None"
      receiver: 'null'

    # 已知的抖动性告警 - 探针瞬时失败、临时性问题
    - matchers:
        - alertname =~ "ProbeFailed|TemporaryIssue"
      receiver: 'null'

    # ==================== 第二层：维护窗口静默 ====================

    # 计划维护期间，Warning 及以下告警静默（Critical 不受影响）
    # continue: true 保证非维护时段时告警继续向下匹配到正式接收器
    - matchers:
        - severity =~ "warning|Warning|WARNING"
      receiver: 'null'
      continue: true
      mute_time_intervals:
        - maintenance-window

    # ==================== 第三层：节点级 Critical 告警 ====================

    # 节点宕机 - 最高优先级，最短响应时间
    - matchers:
        - alertname = "NodeDown"
      receiver: 'wechat-critical'
      group_wait: 10s
      repeat_interval: 30m

    # 节点未就绪 - 高优先级
    - matchers:
        - alertname = "KubeNodeNotReady"
      receiver: 'wechat-critical'
      group_wait: 10s
      repeat_interval: 1h

    # 节点不可达 - 高优先级
    - matchers:
        - alertname = "KubeNodeUnreachable"
      receiver: 'wechat-critical'
      group_wait: 10s
      repeat_interval: 1h

    # etcd 集群异常 - 高优先级
    - matchers:
        - alertname =~ "EtcdMembersDown|EtcdHighFsyncDuration|EtcdDatabaseSpaceLow"
      receiver: 'wechat-critical'
      group_wait: 10s
      repeat_interval: 30m

    # 控制平面组件宕机 - 高优先级
    - matchers:
        - alertname =~ "KubeComponentDown|KubeAPIErrorsHigh"
      receiver: 'wechat-critical'
      group_wait: 10s
      repeat_interval: 30m

    # K8s 证书即将过期（Critical 级别，7 天内）
    - matchers:
        - alertname = "KubeCertWillExpireCritical"
      receiver: 'wechat-critical'
      group_wait: 0s         # 立即通知
      repeat_interval: 1h

    # ==================== 第四层：通用 Critical 级别告警 ====================
    - matchers:
        - severity =~ "critical|Critical|CRITICAL"
      receiver: 'wechat-critical'
      group_wait: 10s
      repeat_interval: 1h

    # ==================== 第五层：基础设施资源告警（Warning） ====================
    - matchers:
        - alertname =~ "HighCpuUsage|HighCpuUsageCritical|HighMemoryUsage|HighMemoryUsageCritical|DiskSpaceLow|DiskSpaceCritical|DiskSpaceFillingUp|HighDiskIo|HighSystemLoad|HighFileDescriptorUsage"
      receiver: 'wechat-warning'
      group_wait: 1m
      repeat_interval: 4h

    # ==================== 第六层：应用服务告警（Warning） ====================
    - matchers:
        - alertname =~ "ServiceDown|HighHttpErrorRate|HighHttpResponseTime|ContainerCpuThrottling|ContainerMemoryNearLimit|KubePodCrashLooping|KubePodNotReady|KubePodOOMKilled|KubeDeploymentReplicasMismatch|KubeStatefulSetReplicasMismatch|KubeDaemonSetRolloutStuck|KubeHPAMaxedOut"
      receiver: 'wechat-warning'
      group_wait: 30s
      repeat_interval: 4h

    # ==================== 第七层：通用 Warning 级别告警 ====================
    - matchers:
        - severity =~ "warning|Warning|WARNING"
      receiver: 'wechat-warning'
      group_wait: 30s
      repeat_interval: 4h

    # ==================== 兜底：其他所有告警走默认接收器 ====================
    # 由顶层 default receiver 'wechat-webhook' 处理

# ==================== 抑制规则 ====================
# 当高严重级别告警存在时，抑制低级别告警，避免告警风暴
inhibit_rules:
  # 规则 1：Critical 抑制同 alertname + namespace 的 Warning
  - source_matchers:
      - severity =~ "critical|Critical|CRITICAL"
    target_matchers:
      - severity =~ "warning|Warning|WARNING"
    equal: ['alertname', 'namespace']

  # 规则 2：Warning 抑制同 alertname + namespace 的 Info
  - source_matchers:
      - severity =~ "warning|Warning|WARNING"
    target_matchers:
      - severity =~ "info|Info|INFO"
    equal: ['alertname', 'namespace']

  # 规则 3：节点级 Critical 抑制该节点上的 Pod 级 Warning
  # 节点宕机时，其上的 Pod 告警无需单独通知（kube-state-metrics 指标用 node 标签标识节点）
  - source_matchers:
      - severity = "critical"
      - alertname =~ "NodeDown|KubeNodeNotReady|KubeNodeUnreachable"
    target_matchers:
      - severity =~ "warning|info"
      - alertname =~ "KubePodCrashLooping|KubePodNotReady|ServiceDown|KubeDeploymentReplicasMismatch|HighCpuUsage|HighMemoryUsage|DiskSpaceLow"
    equal: ['node']

  # 规则 4：Critical 基础设施告警抑制同实例的资源使用类 Warning
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
      - alertname =~ "HighCpuUsage|HighMemoryUsage|DiskSpaceLow|HighDiskIo|HighNetworkPacketLoss|HighHttpResponseTime|ContainerCpuThrottling|ContainerMemoryNearLimit"
    equal: ['instance', 'namespace']

  # 规则 5：kube-state-metrics 宕机时，抑制所有依赖其数据的 K8s 对象告警
  - source_matchers:
      - alertname = "KubeStateMetricsDown"
    target_matchers:
      - alertname =~ "KubePodCrashLooping|KubePodNotReady|KubeDeploymentReplicasMismatch|KubeStatefulSetReplicasMismatch|KubeDaemonSetRolloutStuck|KubePersistentVolumeUsageHigh|KubeHPAMaxedOut"
    equal: ['namespace']

# ==================== 接收器配置 ====================
receivers:
  # 企业微信机器人 - 默认接收器（处理未分类告警）
  - name: 'wechat-webhook'
    webhook_configs:
      - url: 'http://wechat-webhook-adapter.monitoring.svc.cluster.local:80/webhook'
        send_resolved: true     # 发送告警恢复通知
        http_config:
          timeout: 30s
          # 如需认证，取消下方注释：
          # basic_auth:
          #   username: "webhook"
          #   password: "password"
          # bearer_token: "your_token_here"

  # Critical 告警专用接收器 - 最短响应时间
  - name: 'wechat-critical'
    webhook_configs:
      - url: 'http://wechat-webhook-adapter.monitoring.svc.cluster.local:80/webhook'
        send_resolved: true
        http_config:
          timeout: 30s
    # 可扩展其他紧急通知渠道（短信/电话/PagerDuty）:
    # pagerduty_configs:
    #   - service_key: 'your_pagerduty_service_key'
    #     send_resolved: true

  # Warning 告警接收器
  - name: 'wechat-warning'
    webhook_configs:
      - url: 'http://wechat-webhook-adapter.monitoring.svc.cluster.local:80/webhook'
        send_resolved: true
        http_config:
          timeout: 30s

  # 静默接收器 - 不发送任何通知（用于丢弃告警）
  - name: 'null'

# ==================== 高可用集群配置（可选） ====================
# 部署多个 Alertmanager 实例时启用，确保去重通知
# cluster:
#   peers:
#     - alertmanager-0.alertmanager-operated.monitoring.svc:9094
#     - alertmanager-1.alertmanager-operated.monitoring.svc:9094
#   listen_address: "0.0.0.0:9094"
#   advertise_address: "0.0.0.0:9094"
