# ============================================================================
# 企业微信机器人 Webhook 中转服务 - Kubernetes 部署配置 (Go 版本)
# ============================================================================
# 前置条件:
#   1. 已创建企业微信群机器人并获取 Key
#      获取方式: 群聊 -> 群设置 -> 添加群机器人 -> 复制 Webhook 地址
#   2. 已构建镜像并推送到镜像仓库 (或本地导入)
#
# 构建镜像:
#   # 方式一: 有远程镜像仓库
#   REGISTRY=your-registry.com/jesse ./build.sh
#
#   # 方式二: 本地构建后导入 (离线环境)
#   ./build.sh save
#   docker load -i wechat-webhook-v1.0.0.tar
#   # 然后修改下方 image 为本地镜像名
#
# 使用方法:
#   1. 修改 WECHAT_WEBHOOK_KEY 环境变量为你的机器人 Key
#   2. 修改 image 为你的镜像地址
#   3. kubectl apply -f wechat-webhook-k8s.yaml
#   4. 配置 Alertmanager webhook 指向 http://wechat-webhook:80/webhook
#
# 验证方式:
#   curl -X POST http://wechat-webhook:80/webhook \
#     -H "Content-Type: application/json" \
#     -d '{"status":"firing","alerts":[{"labels":{"alertname":"Test","severity":"warning","instance":"test-01"},"annotations":{"summary":"测试告警"}}]}'
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: wechat-webhook-adapter
  namespace: monitoring
  labels:
    app: wechat-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wechat-webhook
  template:
    metadata:
      labels:
        app: wechat-webhook
    spec:
      containers:
        - name: wechat-webhook
          # ==================== 修改为你的镜像地址 ====================
          # 本地构建: wechat-webhook:v1.0.0
          # 远程仓库: your-registry.com/jesse/wechat-webhook:v1.0.0
          image: registry.cn-guangzhou.aliyuncs.com/jessedev/wechat-webhook-adapter:v1.0.0
          imagePullPolicy: IfNotPresent  # 本地镜像用 IfNotPresent，远程用 Always
          env:
            # ==================== 重要：修改为你的企业微信机器人 Key ====================
            - name: WECHAT_WEBHOOK_KEY
              value: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
            - name: WEBHOOK_PORT
              value: "80"
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          # 健康检查
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: wechat-webhook-adapter
  namespace: monitoring
spec:
  selector:
    app: wechat-webhook
  ports:
    - port: 80
      targetPort: 80
      name: http
